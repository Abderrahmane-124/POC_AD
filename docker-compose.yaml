services:
  samba:
    image: diegogslomp/samba-ad-dc
    container_name: samba
    privileged: true
    environment:
      # The Kerberos realm / full Active Directory DNS domain name
      - REALM=CORP.LOCALDOMAIN
      # The NetBIOS name / Windows legacy domain identifier
      - DOMAIN=CORP
      - ADMIN_PASS=Devsecops@mcl2026
      # DNS server Samba will query when it cannot resolve something itself
      - DNS_FORWARDER=8.8.8.8
    networks:
      - samba_network
    volumes:
      - smb:/var/lib/samba
      - ./samba-entrypoint.sh:/samba-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/samba-entrypoint.sh"] 

  # phpLDAPadmin:
  #   image: phpldapadmin/phpldapadmin
  #   environment:
  #     - LDAP_SERVER_NAME=Samba AD DC
  #     - LDAP_SERVER_HOST=samba
  #     - LDAP_SERVER_PORT=389
  #     - LDAP_SERVER_BIND_ID=cn=Administrator,cn=Users,dc=corp,dc=localdomain
  #     - LDAP_SERVER_BASE_DN=dc=corp,dc=localdomain
  #     - LDAP_SERVER_HTTPS=false
  #   ports:
  #     - "6443:80"
  #   networks:
  #     - samba_network
  #   depends_on:
  #     - samba

  keycloak:
    image: keycloak/keycloak:26.6
    container_name: keycloak
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin

    command: start-dev
    ports:
      - "8081:8080"
    networks:
      - samba_network
    volumes:
      - keycloak_data:/opt/keycloak/data

networks:
  samba_network:
    driver: bridge
    
volumes:
  smb:
  keycloak_data:
